workflows:
  ios-release:
    name: Family Media Hub iOS Release

    environment:
      node: 20

    scripts:
      - name: Install dependencies
        script: |
          npm ci

      - name: Install EAS CLI
        script: |
          npm install -g eas-cli

      - name: Login to Expo
        script: |
          eas whoami || eas login --token $EXPO_TOKEN

      - name: Verify Expo Config
        script: |
          npx expo config --type public

      - name: Build iOS
        script: |
          eas build --platform ios --non-interactive

    artifacts:
      - "*.ipa"
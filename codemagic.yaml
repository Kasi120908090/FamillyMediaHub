workflows:
  ios-release:
    name: Family Media Hub iOS Release

    environment:
      xcode: latest
      cocoapods: default
      node: 20

    scripts:
      - name: Install dependencies
        script: |
          npm ci

      - name: Install Expo CLI
        script: |
          npm install -g expo-cli

      - name: Verify Expo Config
        script: |
          npx expo config --type public

      - name: Generate iOS Native Project
        script: |
          npx expo prebuild --platform ios --non-interactive

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace ios/*.xcworkspace \
            --scheme FamilyMediaHub

    artifacts:
      - build/ios/ipa/*.ipa